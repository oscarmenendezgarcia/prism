<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>S-02: Task Detail Panel — Saving State (isMutating)</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: Inter, -apple-system, BlinkMacSystemFont, sans-serif;
    background: #0D0D0F;
    color: #E0E0E0;
    min-height: 100vh;
    font-size: 14px;
    display: flex;
    justify-content: flex-end;
  }
  .detail-panel {
    width: 380px;
    height: 100vh;
    background: #1a1a1f;
    border-left: 1px solid rgba(255,255,255,0.08);
    display: flex;
    flex-direction: column;
    box-shadow: -8px 0 32px rgba(0,0,0,0.4);
  }
  .panel-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 16px 20px 14px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  .id-chip {
    font-size: 11px;
    color: #6b7280;
    background: #232329;
    border-radius: 9999px;
    padding: 2px 8px;
    font-family: monospace;
  }
  .col-chip {
    font-size: 11px;
    background: rgba(10,132,255,0.15);
    color: #0A84FF;
    border-radius: 9999px;
    padding: 2px 8px;
  }
  .close-btn {
    margin-left: auto;
    width: 28px; height: 28px;
    border: none;
    background: transparent;
    color: #6b7280;
    cursor: pointer;
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
  }
  .panel-body {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }
  .saving-indicator {
    font-size: 11px;
    color: #0A84FF;
    text-align: right;
    margin-top: -14px;
    margin-bottom: -6px;
    animation: pulse 1s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  .field-group { display: flex; flex-direction: column; gap: 6px; }
  .field-label {
    font-size: 10px;
    font-weight: 600;
    color: #6b7280;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  /* Disabled inputs */
  .field-input {
    background: #232329;
    border: 1px solid transparent;
    border-radius: 8px;
    padding: 8px 12px;
    color: #E0E0E0;
    font-size: 13px;
    font-family: inherit;
    outline: none;
    width: 100%;
    opacity: 0.5;
    cursor: not-allowed;
  }
  textarea.field-input { resize: none; line-height: 1.5; }
  .seg-control { display: flex; gap: 6px; }
  .seg-pill {
    flex: 1;
    padding: 7px 0;
    border-radius: 9999px;
    font-size: 12px;
    font-weight: 500;
    text-align: center;
    border: 1px solid transparent;
    font-family: inherit;
    opacity: 0.5;
    cursor: not-allowed;
  }
  .seg-task.selected {
    background: rgba(232,104,0,0.2);
    color: #E86800;
    border-color: rgba(232,104,0,0.4);
  }
  .seg-research.unselected {
    background: transparent;
    color: #6b7280;
    border-color: rgba(255,255,255,0.1);
  }
  .desc-footer { display: flex; justify-content: flex-end; align-items: center; gap: 8px; margin-top: 6px; }
  .save-desc-btn {
    background: #232329;
    color: #6b7280;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 6px;
    padding: 5px 12px;
    font-size: 12px;
    font-family: inherit;
    cursor: not-allowed;
    opacity: 0.5;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .spinner {
    width: 10px; height: 10px;
    border: 1.5px solid rgba(255,255,255,0.2);
    border-top-color: #0A84FF;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .panel-footer {
    padding: 14px 20px;
    border-top: 1px solid rgba(255,255,255,0.08);
    display: flex;
    flex-direction: column;
    gap: 3px;
  }
  .footer-meta { font-size: 11px; color: #6b7280; }
</style>
</head>
<body>
<div class="detail-panel" role="dialog" aria-modal="true" aria-label="Task detail" aria-busy="true">
  <div class="panel-header">
    <span class="id-chip">#a1b2c3</span>
    <span class="col-chip">In Progress</span>
    <button class="close-btn" aria-label="Close task detail">✕</button>
  </div>

  <div class="panel-body">
    <!-- Saving indicator -->
    <div class="saving-indicator" aria-live="polite">Saving...</div>

    <!-- Title — disabled -->
    <div class="field-group">
      <label class="field-label" for="panel-title">Title</label>
      <input id="panel-title" class="field-input" type="text" value="Build auth flow" disabled aria-disabled="true">
    </div>

    <!-- Type — disabled -->
    <div class="field-group">
      <span class="field-label">Type</span>
      <div class="seg-control" role="radiogroup" aria-label="Task type" aria-disabled="true">
        <button class="seg-pill seg-task selected" role="radio" aria-checked="true" disabled>task</button>
        <button class="seg-pill seg-research unselected" role="radio" aria-checked="false" disabled>research</button>
      </div>
    </div>

    <!-- Assigned — disabled -->
    <div class="field-group">
      <label class="field-label" for="panel-assigned">Assigned</label>
      <input id="panel-assigned" class="field-input" type="text" value="developer-agent" disabled aria-disabled="true">
    </div>

    <!-- Description — disabled -->
    <div class="field-group">
      <label class="field-label" for="panel-desc">Description</label>
      <textarea id="panel-desc" class="field-input" rows="4" disabled aria-disabled="true">Implement JWT-based authentication with refresh tokens.</textarea>
      <div class="desc-footer">
        <button class="save-desc-btn" disabled aria-disabled="true">
          <span class="spinner"></span>
          Save description
        </button>
      </div>
    </div>
  </div>

  <div class="panel-footer">
    <span class="footer-meta">Created: Mar 9, 2026 - 14:32</span>
    <span class="footer-meta">Updated: Mar 24, 2026 - 12:00</span>
  </div>
</div>
</body>
</html>
