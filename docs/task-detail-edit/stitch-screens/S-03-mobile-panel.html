<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390px, initial-scale=1.0">
<title>S-03: Task Detail Panel — Mobile (Full Screen)</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: Inter, -apple-system, BlinkMacSystemFont, sans-serif;
    background: #0D0D0F;
    color: #E0E0E0;
    font-size: 14px;
  }
  /* Simulate mobile viewport via max-width */
  .viewport-wrapper {
    max-width: 390px;
    margin: 0 auto;
    min-height: 100vh;
    position: relative;
    background: #0D0D0F;
    overflow: hidden;
  }
  /* Board underneath (blurred/covered) */
  .board-hint {
    position: absolute;
    inset: 0;
    background: #0D0D0F;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #6b7280;
    font-size: 12px;
  }
  /* Mobile full-screen panel */
  .detail-panel {
    position: fixed;
    inset: 0;
    max-width: 390px;
    left: 50%;
    transform: translateX(-50%);
    background: #1a1a1f;
    display: flex;
    flex-direction: column;
    z-index: 50;
  }
  .panel-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 14px 16px 12px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    background: #1a1a1f;
    position: sticky;
    top: 0;
    z-index: 1;
  }
  .id-chip {
    font-size: 11px;
    color: #6b7280;
    background: #232329;
    border-radius: 9999px;
    padding: 2px 8px;
    font-family: monospace;
  }
  .col-chip {
    font-size: 11px;
    background: rgba(10,132,255,0.15);
    color: #0A84FF;
    border-radius: 9999px;
    padding: 2px 8px;
  }
  .close-btn {
    margin-left: auto;
    min-width: 44px; min-height: 44px;
    border: none;
    background: transparent;
    color: #6b7280;
    cursor: pointer;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }
  .panel-body {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 18px;
    -webkit-overflow-scrolling: touch;
  }
  .field-group { display: flex; flex-direction: column; gap: 6px; }
  .field-label {
    font-size: 10px;
    font-weight: 600;
    color: #6b7280;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .field-input {
    background: #232329;
    border: 1px solid transparent;
    border-radius: 8px;
    padding: 10px 12px;
    color: #E0E0E0;
    font-size: 15px; /* larger for mobile readability */
    font-family: inherit;
    outline: none;
    width: 100%;
    min-height: 44px;
  }
  .field-input:focus { border-color: #0A84FF; }
  textarea.field-input { resize: none; line-height: 1.5; min-height: 88px; }
  .seg-control { display: flex; gap: 8px; }
  .seg-pill {
    flex: 1;
    padding: 10px 0; /* 44px height */
    border-radius: 9999px;
    font-size: 13px;
    font-weight: 500;
    text-align: center;
    border: 1px solid transparent;
    font-family: inherit;
    cursor: pointer;
    min-height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .seg-task.selected {
    background: rgba(232,104,0,0.2);
    color: #E86800;
    border-color: rgba(232,104,0,0.4);
  }
  .seg-research.unselected {
    background: transparent;
    color: #6b7280;
    border-color: rgba(255,255,255,0.1);
  }
  .desc-footer { display: flex; justify-content: flex-end; margin-top: 8px; }
  .save-desc-btn {
    background: #0A84FF;
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 10px 16px;
    font-size: 13px;
    font-family: inherit;
    cursor: pointer;
    min-height: 44px;
  }
  .panel-footer {
    padding: 12px 16px;
    border-top: 1px solid rgba(255,255,255,0.08);
    display: flex;
    flex-direction: column;
    gap: 3px;
    background: #1a1a1f;
  }
  .footer-meta { font-size: 11px; color: #6b7280; }
</style>
</head>
<body>
<div class="viewport-wrapper">
  <div class="board-hint">Board (behind panel)</div>

  <!-- Full-screen mobile panel -->
  <div class="detail-panel" role="dialog" aria-modal="true" aria-label="Task detail">
    <div class="panel-header">
      <span class="id-chip">#a1b2c3</span>
      <span class="col-chip">In Progress</span>
      <button class="close-btn" aria-label="Close task detail">✕</button>
    </div>

    <div class="panel-body">
      <!-- Title -->
      <div class="field-group">
        <label class="field-label" for="panel-title">Title</label>
        <input id="panel-title" class="field-input" type="text" value="Build auth flow">
      </div>

      <!-- Type -->
      <div class="field-group">
        <span class="field-label">Type</span>
        <div class="seg-control" role="radiogroup" aria-label="Task type">
          <button class="seg-pill seg-task selected" role="radio" aria-checked="true">task</button>
          <button class="seg-pill seg-research unselected" role="radio" aria-checked="false">research</button>
        </div>
      </div>

      <!-- Assigned -->
      <div class="field-group">
        <label class="field-label" for="panel-assigned">Assigned</label>
        <input id="panel-assigned" class="field-input" type="text" value="developer-agent">
      </div>

      <!-- Description -->
      <div class="field-group">
        <label class="field-label" for="panel-desc">Description</label>
        <textarea id="panel-desc" class="field-input" rows="4">Implement JWT-based authentication with refresh tokens.</textarea>
        <div class="desc-footer">
          <button class="save-desc-btn">Save description</button>
        </div>
      </div>
    </div>

    <div class="panel-footer">
      <span class="footer-meta">Created: Mar 9, 2026 - 14:32</span>
      <span class="footer-meta">Updated: Mar 24, 2026 - 12:00</span>
    </div>
  </div>
</div>
</body>
</html>
