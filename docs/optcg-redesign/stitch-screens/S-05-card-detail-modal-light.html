<div class="flex items-start justify-between">
<h1 class="text-4xl md:text-5xl font-black text-slate-900 dark:text-white tracking-tight leading-none uppercase">
                        Monkey.D.Luffy
                    </h1>
</div>
<div class="flex flex-wrap items-center gap-3">
<span class="inline-flex items-center px-4 py-1 rounded-full bg-gold/20 border border-gold/30 text-gold font-bold text-sm tracking-widest uppercase">
                        Leader
                    </span>

</div>

</div>
<div class="flex flex-col gap-1">
<span class="text-xs font-bold text-slate-400 dark:text-slate-500 uppercase tracking-widest">Power</span>
<span class="text-2xl font-black text-slate-900 dark:text-white">5000</span>
</div>
<div class="flex flex-col gap-1">
<span class="text-xs font-bold text-slate-400 dark:text-slate-500 uppercase tracking-widest">Counter</span>

<span class="text-2xl font-black text-slate-900 dark:text-white">5</span>
</div>
</div>
<hr class="border-slate-100 dark:border-slate-800"/>
<!-- Traits -->
<div class="flex flex-col gap-3">
<span class="text-xs font-bold text-slate-400 dark:text-slate-500 uppercase tracking-widest">Traits</span>
<div class="flex flex-wrap gap-2">
<span class="px-4 py-1.5 rounded-lg bg-slate-100 dark:bg-slate-800 text-slate-700 dark:text-slate-200 text-sm font-semibold">
                        Straw Hat Crew
                    </span>
<span class="px-4 py-1.5 rounded-lg bg-slate-100 dark:bg-slate-800 text-slate-700 dark:text-slate-200 text-sm font-semibold">
                        Supernovas
                    </span>
</div>
</div>
<!-- Effect Section -->
<div class="flex flex-col gap-4">
<div class="flex items-center gap-2">
<span class="text-xs font-bold text-slate-400 dark:text-slate-500 uppercase tracking-widest">Card Effect</span>
</div>
<div class="p-6 rounded-xl border-l-4 border-primary bg-primary/5 dark:bg-primary/10">
<p class="text-slate-700 dark:text-slate-200 leading-relaxed text-lg italic">
<span class="font-bold text-primary not-italic">[DON!! x1] [Activate: Main] [Once Per Turn]</span> Give up to 1 of your Characters or Leader cards +1000 power during this turn.
                    </p>
</div>
</div>
<!-- Footer Action (Optional context) -->
<div class="mt-auto pt-4 flex gap-4">
<button class="flex-1 bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-xl transition-all shadow-lg shadow-primary/20 flex items-center justify-center gap-2">
<span class="material-symbols-outlined">add_circle</span>
                    Add to Deck
                </button>
<button class="px-6 border-2 border-slate-200 dark:border-slate-700 text-slate-600 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-800 font-bold py-4 rounded-xl transition-all">
<span class="material-symbols-outlined align-middle">share</span>
