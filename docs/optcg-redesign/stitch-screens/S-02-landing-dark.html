<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>One Piece TCG - Card Search</title>
<!-- Tailwind CSS CDN with plugins -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Google Fonts for Slab-Serif look -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Arvo:wght@400;700&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              navy: '#0B132B',
              'navy-light': '#1C2541',
              gold: '#D4A843',
            }
          },
          fontFamily: {
            serif: ['Arvo', 'serif'],
            sans: ['Inter', 'sans-serif'],
          }
        }
      }
    }
  </script>
<style data-purpose="custom-typography">
    .logo-font {
      font-family: 'Arvo', serif;
      letter-spacing: 0.05em;
    }
    .heading-font {
      font-family: 'Arvo', serif;
      letter-spacing: 0.02em;
    }
  </style>
<style data-purpose="layout-utilities">
    /* Ensure the body takes full height for vertical centering */
    body, html {
      height: 100%;
      margin: 0;
    }
    .main-container {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
  </style>
</head>
<body class="bg-brand-navy text-white font-sans">
<!-- BEGIN: MainHeader -->
<header class="w-full py-6 px-8 flex justify-between items-center" data-purpose="navigation-header">
<div class="logo-font text-2xl font-bold text-brand-gold" id="site-logo">
      OPTCG
    </div>
<!-- Theme Toggle Button -->
<button aria-label="Toggle Theme" class="p-2 text-white/80 hover:text-white transition-colors" id="theme-toggle">
<!-- Sun/Light Mode Icon representing the toggle to light mode -->
<svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="1.5" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M12 3v2.25m6.364.386-1.591 1.591M21 12h-2.25m-.386 6.364-1.591-1.591M12 18.75V21m-4.773-4.227-1.591 1.591M3 12h2.25m.386-6.364 1.591-1.591M12 18.75V21m-4.773-4.227-1.591 1.591M15.75 12a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0Z" stroke-linecap="round" stroke-linejoin="round"></path>
</svg>
</button>
</header>
<!-- END: MainHeader -->
<!-- BEGIN: SearchHeroSection -->
<main class="flex-grow flex flex-col items-center justify-center px-4 -mt-20" data-purpose="hero-search-area">
<!-- Hero Heading Group -->
<div class="text-center mb-10">
<h1 class="heading-font text-5xl md:text-7xl font-bold mb-4 uppercase tracking-tight">
        ONE PIECE TCG
      </h1>
<p class="text-xl md:text-2xl font-medium text-white/90">
        Card Search
      </p>
</div>
<!-- Search Bar Container -->
<div class="w-full max-w-2xl" data-purpose="search-interface">
<form action="#" class="relative flex items-center" method="GET">
<!-- Input Field -->
<input class="w-full py-5 pl-8 pr-32 bg-brand-navy-light border-none rounded-full text-white placeholder-white/40 focus:ring-2 focus:ring-brand-gold text-lg shadow-2xl transition-all" id="card-search-input" placeholder="Search cards..." type="text"/>
<!-- Search Button Overlay -->
<button class="absolute right-2 bg-brand-gold hover:bg-[#c49a3a] text-brand-navy font-bold py-3 px-8 rounded-full flex items-center gap-2 transition-colors duration-200" data-purpose="submit-search" type="submit">
<svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2.5" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z" stroke-linecap="round" stroke-linejoin="round"></path>
</svg>
<span>Search</span>
</button>
</form>
</div>
<!-- Footer Stats -->
<div class="mt-6 text-white/40 text-sm font-medium" data-purpose="card-database-stats">
      2,400 cards across 49 sets
    </div>
</main>
<!-- END: SearchHeroSection -->
<!-- BEGIN: FooterSpacer -->
<footer aria-hidden="true" class="py-8">
<!-- Empty footer to maintain layout balance -->
</footer>
<!-- END: FooterSpacer -->
<script data-purpose="interaction-stubs">
    // Placeholder for search functionality
    const searchForm = document.querySelector('form');
    searchForm?.addEventListener('submit', (e) => {
      e.preventDefault();
      const query = document.getElementById('card-search-input').value;
      console.log('Searching for:', query);
    });

    // Theme toggle interaction visual feedback
    const themeBtn = document.getElementById('theme-toggle');
    themeBtn?.addEventListener('click', () => {
      console.log('Switching to light mode...');
    });
  </script>
</body></html>
