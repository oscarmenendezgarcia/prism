<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Dark Prism Kanban — TaggerReviewModal</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface-container-highest": "#353437",
              "surface-container-high": "#2a2a2c",
              "inverse-surface": "#e4e2e4",
              "secondary": "#aac7ff",
              "surface-container": "#1f1f21",
              "tertiary-container": "#eb6a12",
              "outline-variant": "#414754",
              "on-secondary-fixed": "#001b3e",
              "on-secondary": "#083060",
              "on-tertiary": "#552000",
              "on-error-container": "#ffdad6",
              "surface-dim": "#131315",
              "tertiary-fixed-dim": "#ffb691",
              "primary-fixed": "#d6e3ff",
              "surface-container-low": "#1b1b1d",
              "on-background": "#e4e2e4",
              "error-container": "#93000a",
              "surface-variant": "#353437",
              "background": "#131315",
              "primary-fixed-dim": "#aac7ff",
              "on-secondary-fixed-variant": "#264778",
              "outline": "#8b91a0",
              "secondary-container": "#264778",
              "surface": "#131315",
              "on-secondary-container": "#98b6ee",
              "on-primary": "#003064",
              "on-surface": "#e4e2e4",
              "on-primary-fixed-variant": "#00468d",
              "on-tertiary-fixed": "#341100",
              "tertiary-fixed": "#ffdbcb",
              "surface-tint": "#aac7ff",
              "inverse-primary": "#005db8",
              "primary-container": "#3e90ff",
              "secondary-fixed": "#d6e3ff",
              "error": "#ffb4ab",
              "surface-bright": "#39393b",
              "on-error": "#690005",
              "on-tertiary-fixed-variant": "#793100",
              "on-primary-container": "#002957",
              "secondary-fixed-dim": "#aac7ff",
              "tertiary": "#ffb691",
              "on-tertiary-fixed": "#001b3e",
              "primary": "#aac7ff",
              "on-tertiary-container": "#4a1b00",
              "on-surface-variant": "#c0c6d6"
            },
            fontFamily: {
              "headline": ["Inter", "sans-serif"],
              "body": ["Inter", "sans-serif"],
              "label": ["Inter", "sans-serif"]
            },
            borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .glass-panel { background: rgba(53, 52, 55, 0.6); backdrop-filter: blur(20px); }
        .ghost-border { outline: 1px solid rgba(65, 71, 84, 0.15); }
    </style>
</head>
<body class="bg-surface-dim text-on-surface min-h-screen relative overflow-hidden">
<!-- Background Content: Blurred Kanban Columns -->
<div class="fixed inset-0 z-0 flex p-8 space-x-12 blur-md opacity-40 grayscale pointer-events-none">
<!-- Column 1 -->
<div class="w-80 flex flex-col space-y-4">
<div class="h-6 w-32 bg-surface-container-highest rounded"></div>
<div class="space-y-4">
<div class="h-32 bg-surface-container-high rounded-xl"></div>
<div class="h-24 bg-surface-container-high rounded-xl"></div>
<div class="h-40 bg-surface-container-high rounded-xl"></div>
</div>
</div>
<!-- Column 2 -->
<div class="w-80 flex flex-col space-y-4">
<div class="h-6 w-40 bg-surface-container-highest rounded"></div>
<div class="space-y-4">
<div class="h-28 bg-surface-container-high rounded-xl"></div>
<div class="h-36 bg-surface-container-high rounded-xl"></div>
</div>
</div>
<!-- Column 3 -->
<div class="w-80 flex flex-col space-y-4">
<div class="h-6 w-24 bg-surface-container-highest rounded"></div>
<div class="space-y-4">
<div class="h-44 bg-surface-container-high rounded-xl"></div>
</div>
</div>
</div>
<!-- Modal Overlay -->
<div class="fixed inset-0 z-10 bg-[#000000]/60 backdrop-blur-sm flex items-center justify-center p-4">
<!-- TaggerReviewModal Container -->
<div class="w-full max-w-[640px] bg-[#2C2C2E] border border-[#3A3A3C] rounded-[20px] shadow-[0_8px_32px_0_rgba(0,0,0,0.4),0_2px_8px_0_rgba(170,199,255,0.08)] flex flex-col overflow-hidden">
<!-- Header -->
<div class="px-6 py-5 flex items-start justify-between">
<div class="flex flex-col gap-1">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-xl" style="font-variation-settings: 'FILL' 1;">colors_spark</span>
<h2 class="text-[18px] font-semibold text-on-surface tracking-tight">Auto-tag suggestions</h2>
<span class="ml-2 px-2 py-0.5 bg-surface-container-highest text-on-surface-variant text-[11px] font-medium rounded-md uppercase tracking-wider">claude-3-5-sonnet</span>
</div>
<p class="text-[13px] text-on-surface-variant">4 suggestions · 1 skipped</p>
</div>
<button class="text-on-surface-variant hover:text-on-surface transition-colors">
<span class="material-symbols-outlined text-[20px]">close</span>
</button>
</div>
<!-- Subheader -->
<div class="px-6 pb-4 flex items-center gap-3">
<label class="flex items-center gap-3 cursor-pointer group">
<div class="relative flex items-center justify-center w-4 h-4 rounded border border-outline-variant bg-surface-container-lowest transition-all group-hover:border-primary">
<!-- Unchecked visual -->
</div>
<span class="text-[13px] text-on-surface-variant group-hover:text-on-surface transition-colors">Improve descriptions</span>
</label>
</div>
<!-- Body: Suggestions List -->
<div class="flex-1 overflow-y-auto border-t border-outline-variant/10">
<!-- Row 1: High Confidence Bug -->
<div class="px-6 py-4 flex items-center gap-4 hover:bg-surface-container-high/40 transition-colors">
<div class="w-11 h-11 flex items-center justify-center">
<button class="relative inline-flex h-5 w-9 shrink-0 cursor-pointer rounded-full border-2 border-transparent transition-colors duration-200 ease-in-out focus:outline-none bg-primary">
<span class="translate-x-4 pointer-events-none inline-block h-4 w-4 transform rounded-full bg-on-primary shadow ring-0 transition duration-200 ease-in-out"></span>
</button>
</div>
<div class="flex-1 flex flex-col gap-1.5">
<span class="text-[14px] text-on-surface font-medium leading-none">Fix login redirect loop</span>
<div class="flex items-center gap-2">
<span class="px-2 py-0.5 rounded-full text-[11px] font-semibold bg-surface-container-highest text-on-surface-variant">chore</span>
<span class="material-symbols-outlined text-[14px] text-on-surface-variant">arrow_forward</span>
<span class="px-2 py-0.5 rounded-full text-[11px] font-semibold bg-[#FF3B30]/10 text-[#FF3B30]">bug</span>
</div>
</div>
<div class="flex gap-1 items-center">
<div class="flex gap-0.5">
<div class="w-1.5 h-1.5 rounded-full bg-[#34C759]"></div>
<div class="w-1.5 h-1.5 rounded-full bg-[#34C759]"></div>
<div class="w-1.5 h-1.5 rounded-full bg-[#34C759]"></div>
</div>
<span class="text-[10px] font-bold text-on-surface-variant uppercase tracking-widest ml-1">HIGH</span>
</div>
</div>
<div class="h-px bg-outline-variant/10 mx-6"></div>
<!-- Row 2: High Confidence Feature -->
<div class="px-6 py-4 flex items-center gap-4 hover:bg-surface-container-high/40 transition-colors">
<div class="w-11 h-11 flex items-center justify-center">
<button class="relative inline-flex h-5 w-9 shrink-0 cursor-pointer rounded-full border-2 border-transparent transition-colors duration-200 ease-in-out focus:outline-none bg-primary">
<span class="translate-x-4 pointer-events-none inline-block h-4 w-4 transform rounded-full bg-on-primary shadow ring-0 transition duration-200 ease-in-out"></span>
</button>
</div>
<div class="flex-1 flex flex-col gap-1.5">
<span class="text-[14px] text-on-surface font-medium leading-none">Add dark mode toggle</span>
<div class="flex items-center gap-2">
<span class="px-2 py-0.5 rounded-full text-[11px] font-semibold bg-surface-container-highest text-on-surface-variant">chore</span>
<span class="material-symbols-outlined text-[14px] text-on-surface-variant">arrow_forward</span>
<span class="px-2 py-0.5 rounded-full text-[11px] font-semibold bg-[#6C39C0]/10 text-[#6C39C0]">feature</span>
</div>
</div>
<div class="flex gap-1 items-center">
<div class="flex gap-0.5">
<div class="w-1.5 h-1.5 rounded-full bg-[#34C759]"></div>
<div class="w-1.5 h-1.5 rounded-full bg-[#34C759]"></div>
<div class="w-1.5 h-1.5 rounded-full bg-[#34C759]"></div>
</div>
<span class="text-[10px] font-bold text-on-surface-variant uppercase tracking-widest ml-1">HIGH</span>
</div>
</div>
<div class="h-px bg-outline-variant/10 mx-6"></div>
<!-- Row 3: Med Confidence Tech Debt -->
<div class="px-6 py-4 flex items-center gap-4 hover:bg-surface-container-high/40 transition-colors">
<div class="w-11 h-11 flex items-center justify-center">
<button class="relative inline-flex h-5 w-9 shrink-0 cursor-pointer rounded-full border-2 border-transparent transition-colors duration-200 ease-in-out focus:outline-none bg-primary">
<span class="translate-x-4 pointer-events-none inline-block h-4 w-4 transform rounded-full bg-on-primary shadow ring-0 transition duration-200 ease-in-out"></span>
</button>
</div>
<div class="flex-1 flex flex-col gap-1.5">
<span class="text-[14px] text-on-surface font-medium leading-none">Upgrade dependencies</span>
<div class="flex items-center gap-2">
<span class="px-2 py-0.5 rounded-full text-[11px] font-semibold bg-surface-container-highest text-on-surface-variant">chore</span>
<span class="material-symbols-outlined text-[14px] text-on-surface-variant">arrow_forward</span>
<span class="px-2 py-0.5 rounded-full text-[11px] font-semibold bg-[#E65100]/10 text-[#E65100]">tech-debt</span>
</div>
</div>
<div class="flex gap-1 items-center">
<div class="flex gap-0.5">
<div class="w-1.5 h-1.5 rounded-full bg-[#FF9500]"></div>
<div class="w-1.5 h-1.5 rounded-full bg-[#FF9500]"></div>
<div class="w-1.5 h-1.5 rounded-full bg-surface-container-highest"></div>
</div>
<span class="text-[10px] font-bold text-on-surface-variant uppercase tracking-widest ml-1">MED</span>
</div>
</div>
<div class="h-px bg-outline-variant/10 mx-6"></div>
<!-- Row 4: Low Confidence Feature (Amber/Red Highlight) -->
<div class="px-6 py-4 flex items-center gap-4 bg-[#FF9500]/5 border-l-2 border-[#FF3B30]">
<div class="w-11 h-11 flex items-center justify-center">
<button class="relative inline-flex h-5 w-9 shrink-0 cursor-pointer rounded-full border-2 border-transparent transition-colors duration-200 ease-in-out focus:outline-none bg-surface-container-highest">
<span class="translate-x-0 pointer-events-none inline-block h-4 w-4 transform rounded-full bg-on-surface-variant shadow ring-0 transition duration-200 ease-in-out"></span>
</button>
</div>
<div class="flex-1 flex flex-col gap-1.5">
<span class="text-[14px] text-on-surface font-medium leading-none">Update README</span>
<div class="flex items-center gap-2">
<span class="px-2 py-0.5 rounded-full text-[11px] font-semibold bg-surface-container-highest text-on-surface-variant">chore</span>
<span class="material-symbols-outlined text-[14px] text-on-surface-variant">arrow_forward</span>
<span class="px-2 py-0.5 rounded-full text-[11px] font-semibold bg-[#6C39C0]/10 text-[#6C39C0]">feature</span>
</div>
</div>
<div class="flex gap-1 items-center">
<div class="flex gap-0.5">
<div class="w-1.5 h-1.5 rounded-full bg-[#FF3B30]"></div>
<div class="w-1.5 h-1.5 rounded-full bg-surface-container-highest"></div>
<div class="w-1.5 h-1.5 rounded-full bg-surface-container-highest"></div>
</div>
<span class="text-[10px] font-bold text-on-surface-variant uppercase tracking-widest ml-1">LOW</span>
</div>
</div>
</div>
<!-- Footer -->
<div class="px-6 py-5 border-t border-outline-variant/10 flex items-center justify-between">
<button class="text-[14px] font-medium text-on-surface-variant hover:text-on-surface transition-colors px-4 py-2 rounded-lg">
                    Cancel
                </button>
<button class="bg-[#0A84FF] hover:bg-[#0A84FF]/90 text-white text-[14px] font-semibold px-6 py-2.5 rounded-xl shadow-lg shadow-blue-500/20 active:scale-[0.98] transition-all">
                    Apply selected (3)
                </button>
</div>
</div>
</div>
</body></html>
