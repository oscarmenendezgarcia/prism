<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prism</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ctext x='16' y='24' font-size='22' text-anchor='middle' fill='%237C6DFA'%3E%E2%97%86%3C/text%3E%3C/svg%3E" />
  <!-- ADR-003 §4A.4: FOIT prevention — set html.dark class synchronously before any CSS or React loads.
       Reads localStorage('prism-theme'). Falls back to prefers-color-scheme for 'system' or absent key.
       Wrapped in try/catch: some mobile/privacy browsers throw on localStorage access. -->
  <script>(function(){try{var t=localStorage.getItem('prism-theme');var d=t==='dark'||(t!=='light'&&window.matchMedia('(prefers-color-scheme: dark)').matches);if(d)document.documentElement.classList.add('dark');}catch(e){}})()</script>
  <!-- Boot-error overlay: if any uncaught error or unhandled rejection happens before
       React mounts anything into #root, render the message into the page instead of a
       silent blank screen. Essential for diagnosing mobile-only failures with no console.
       The childElementCount guard means a rendered app is never clobbered by a later error. -->
  <script>(function(){function show(msg){try{var r=document.getElementById('root');if(!r||r.childElementCount>0)return;r.innerHTML='<div style="font-family:ui-monospace,Menlo,Consolas,monospace;padding:20px;color:#fca5a5;background:#141414;min-height:100vh;white-space:pre-wrap;word-break:break-word;font-size:13px;line-height:1.6"><strong style="color:#f87171;font-size:15px">Prism failed to start</strong>\n\n'+String(msg).replace(/</g,'&lt;')+'\n\nReload after fixing, or send this message.</div>';}catch(e){}}window.addEventListener('error',function(e){show((e&&e.message?e.message:'Script error')+(e&&e.filename?'\n  at '+e.filename+':'+e.lineno+':'+e.colno:''));});window.addEventListener('unhandledrejection',function(e){var x=e&&e.reason;show('Unhandled promise rejection:\n'+(x&&x.stack?x.stack:String(x)));});})()</script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Roboto+Slab:wght@700;800&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap"
  />
  <!-- Ensure box-drawing characters (U+2500–U+257F) use a consistent monospace font
       so ASCII wireframe art aligns correctly in <pre> blocks. -->
  <style>
    @font-face {
      font-family: 'JetBrains Mono';
      src: local('Menlo'), local('Consolas'), local('DejaVu Sans Mono'), local('Courier New');
      unicode-range: U+2500-U+257F;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>

</body>
</html>
